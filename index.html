<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>[Ladepark Wesermarsch] – Wir sind bald da</title>
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,700;1,700&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500&display=swap" rel="stylesheet" />
        <link href="css/styles.css" rel="stylesheet" />
        <style>
            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }

            /* Video Hintergrund */
            .bg-video {
                position: fixed;
                top: 50%; left: 50%;
                min-width: 100%; min-height: 100%;
                transform: translate(-50%, -50%);
                z-index: 0;
                object-fit: cover;
            }

            /* Diagonaler Streifen als Parallelogramm, zentriert */
            .diagonal-stripe {
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                z-index: 1;
                pointer-events: none;
            }
            .diagonal-stripe::before {
                content: "";
                position: absolute;
                top: 0; left: 0;
                width: 100%; height: 100%;
                background: rgba(91, 138, 181, 0.88);
                /* Parallelogramm: linke Kante oben bei 25%, unten bei 10% 
                   rechte Kante oben bei 75%, unten bei 60% */
                clip-path: polygon(25% 0%, 75% 0%, 60% 100%, 10% 100%);
            }

            /* Inhalt über dem Streifen, zentriert */
            .content-wrap {
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100%;
                z-index: 2;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .content-inner {
                width: 42%;
                color: #fff;
                font-family: "Source Sans 3", sans-serif;
                padding: 2rem;
            }
            .content-inner h1 {
                font-family: "Merriweather", Georgia, serif;
                font-size: 1.75rem;
                font-style: italic;
                margin-bottom: 1rem;
            }
            .content-inner p {
                font-size: 0.9rem;
                margin-bottom: 0.4rem;
            }
            .content-inner hr {
                border-color: rgba(255,255,255,0.4);
                margin: 1.2rem 0;
            }
            .content-inner a {
                color: #fff;
            }
            .content-inner i {
                margin-right: 0.5rem;
            }
        </style>
    </head>
    <body>
        <!-- Hintergrundvideo -->
        <video class="bg-video" playsinline autoplay muted loop>
            <source src="assets/mp4/bg.mp4" type="video/mp4" />
        </video>

        <!-- Diagonaler Farbstreifen -->
        <div class="diagonal-stripe"></div>

        <!-- Textinhalt -->
        <div class="content-wrap">
            <div class="content-inner">
                <h1>Ladepark Wesermarsch</h1>
                <p>[Projektseite - Projekt in Planungsphase]</p>
                <p>Unser Ladepark wird bald batterieelektrische Fernverkehr-LKWs in der Wesermarsch versorgen!</p>

                <hr />

                <p><i class="fas fa-building"></i>Projektgruppe Ladepark Wesermarsch</p>
                <p><i class="fas fa-map-marker-alt"></i>26919 Brake</p>
                <p><i class="fas fa-envelope"></i><a href="mailto:kontakt@ladepark-wesermarsch.de">kontakt@ladepark-wesermarsch.de</a></p>
                <p style="margin-bottom:0"></p>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
